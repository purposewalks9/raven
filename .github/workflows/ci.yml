name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compiler:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: compiler
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json
      - name: Test
        run: npx vitest run
      - name: Build
        run: npx tsup src/index.ts src/cli/index.ts --format esm --dts --clean
